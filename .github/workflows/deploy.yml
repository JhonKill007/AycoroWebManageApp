name: Deploy Aycoro Manage Web

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set Docker image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            --build-arg REACT_APP_API_URL="${{ secrets.REACT_APP_API_URL }}" \
            --build-arg REACT_APP_MANAGE_API_URL="${{ secrets.REACT_APP_MANAGE_API_URL }}" \
            --build-arg REACT_APP_CHAT_URL="${{ secrets.REACT_APP_CHAT_URL }}" \
            --build-arg REACT_APP_TITTLE_BASE="${{ secrets.REACT_APP_TITTLE_BASE }}" \
            --build-arg REACT_APP_SYSTEM_LOGIN_KEY="${{ secrets.REACT_APP_SYSTEM_LOGIN_KEY }}" \
            --build-arg REACT_APP_SYSTEM_LOGIN_PASSWORD="${{ secrets.REACT_APP_SYSTEM_LOGIN_PASSWORD }}" \
            -t aycoro/manageweb:${{ env.TAG }} .

      - name: Save Docker image
        run: docker save aycoro/manageweb:${{ env.TAG }} -o aycoro-manageweb.tar

      - name: Copy image to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "aycoro-manageweb.tar"
          target: "~/"

      - name: Deploy on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker load -i ~/aycoro-manageweb.tar
            # detener cualquier contenedor que esté usando el puerto 1000
            docker ps -q --filter "publish=1000" | xargs -r docker stop || true
            docker ps -aq --filter "publish=1000" | xargs -r docker rm || true
            # detener y eliminar el contenedor anterior si existe
            docker stop aycoro-manageweb || true
            docker rm aycoro-manageweb || true
            # correr nuevo contenedor con nombre fijo
            docker run -d --name aycoro-manageweb -p 1000:80 --restart unless-stopped aycoro/manageweb:${{ env.TAG }}

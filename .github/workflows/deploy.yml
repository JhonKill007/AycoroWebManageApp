name: Deploy Aycoro web

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set Docker image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t aycoro/web:${{ env.TAG }} .

      - name: Save Docker image
        run: docker save aycoro/web:${{ env.TAG }} -o aycoro-web.tar

      - name: Copy image to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "aycoro-web.tar"
          target: "~/"

      - name: Deploy on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker load -i ~/aycoro-web.tar
            # detener cualquier contenedor que esté usando el puerto 3000
            docker ps -q --filter "publish=3000" | xargs -r docker stop || true
            docker ps -aq --filter "publish=3000" | xargs -r docker rm || true
            # detener y eliminar el contenedor anterior si existe
            docker stop aycoro-web || true
            docker rm aycoro-web || true
            # correr nuevo contenedor con nombre fijo
            docker run -d --name aycoro-web -p 3000:3000 --restart always aycoro/web:${{ env.TAG }}
